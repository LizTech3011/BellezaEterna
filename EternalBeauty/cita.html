<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Agendar Cita - Belleza Eterna</title>

    <link rel="stylesheet" href="Style4.css">
</head>

<body>

<header class="navbar">

    <div class="logo-container">
        <img src="LogoTrans.png" alt="Logo">

        <div class="titulo">
            <h1>BELLEZA <span>ETERNA</span></h1>
            <p>DETALLES PROPIOS CONVERTIDOS EN ARTE</p>
        </div>
    </div>

    <nav>
        <ul>
            <li><a href="index.html">INICIO</a></li>
            <li><a href="servicios.html">SERVICIOS</a></li>
            <li><a href="cita.html" class="activo">AGENDAR CITA</a></li>
            <li><a href="contacto.html">CONTACTO</a></li>
        </ul>
    </nav>

</header>

<h1>Agenda tu cita</h1>

<div class="cita-container">

    <form class="cita-form">

        <label>Nombre completo</label>
        <input type="text" placeholder="Escribe tu nombre">

        <label>Teléfono</label>
        <input type="tel" placeholder="Número de contacto">

        <label>Servicio</label>
        <select>
            <option>Cabello</option>
            <option>Uñas</option>
            <option>Facial</option>
            <option>Maquillaje</option>
        </select>

        <label>Fecha</label>
        <input type="date">

        <label>Hora</label>
        <input type="time">

        <label>Comentarios</label>
        <textarea placeholder="Detalles adicionales..."></textarea>

        <button type="submit">Agendar cita</button>

    </form>

</div>

</body>
</html>
